name: Build fireware
on:
  workflow_dispatch:
  push:
    branches:
      - main

    paths:
      - "src/fireware-code/csi-recv-end/**"


  pull_request:
    paths:
      - "src/fireware-code/csi-recv-end/**"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: esp-idf build
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: v5.5.3
        target: esp32s3
        path: 'src/fireware-code/csi-recv-end'


    - name: Upload firmware artifacts
      uses: actions/upload-artifact@v4
      with:
        name: firmware-esp32s3
        path: |
          src/fireware-code/csi-recv-end/build/*.bin
        if-no-files-found: warn
        retention-days: 7