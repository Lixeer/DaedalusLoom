name: Build fireware
on:
  workflow_dispatch:
  push:
    branches:
      - main

    paths:
      - "CMakeLists.txt"
      - '**.c'
      - '**.rs'
      - '**.h'
      - 'sdkconfig'

  pull_request:
    paths:
      - "CMakeLists.txt"
      - '**.c'
      - '**.rs'
      - '**.h'
      - 'sdkconfig'
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'
    - name: esp-idf build
      uses: espressif/esp-idf-ci-action@v1
      with:
        esp_idf_version: v5.5.3
        target: esp32s3
        path: 'src/fireware-code/csi-recv-end'